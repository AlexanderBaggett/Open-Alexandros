name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU PyTorch
        run: python -m pip install --index-url https://download.pytorch.org/whl/cpu torch

      - name: Install package
        run: python -m pip install -e '.[dev]'

      - name: Lint
        run: python -m ruff check src scripts tests examples

      - name: Format check
        run: python -m ruff format --check src scripts tests examples

      - name: Compile Python files
        run: python -m compileall -q src scripts tests examples

      - name: Run tests
        run: python -m pytest -q

      - name: CLI smoke
        run: |
          python scripts/generate.py --config configs/heavy_debug.yaml --prompt-ids 1,2,3 --max-new-tokens 2 --use-cache
          python scripts/eval.py --config configs/heavy_debug.yaml --out-dir runs/ci_eval
